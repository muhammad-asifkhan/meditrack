services:
  postgres:
    image: postgres:15-alpine
    container_name: meditrack_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-meditrack}
      POSTGRES_USER: ${DB_USER:-meditrack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meditrack_secret_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meditrack_user} -d ${DB_NAME:-meditrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    container_name: meditrack_ml
    restart: unless-stopped
    environment:
      - PORT=8001
    ports:
      - "8001:8001"
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meditrack_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${API_PORT:-3001}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-meditrack}
      DB_USER: ${DB_USER:-meditrack_user}
      DB_PASSWORD: ${DB_PASSWORD:-meditrack_secret_2024}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production}
      ML_SERVICE_URL: http://ml-service:8001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      SEED_DB: ${SEED_DB:-true}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - export_files:/app/exports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: meditrack_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  ml_models:
  export_files:
